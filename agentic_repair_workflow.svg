<svg viewBox="0 0 1000 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090c10" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <style>
      @keyframes core-pulse {
        0%   { stroke: #a371f7; filter: drop-shadow(0 0 4px #a371f7); }
        50%  { stroke: #d2a8ff; filter: drop-shadow(0 0 16px #d2a8ff); }
        100% { stroke: #a371f7; filter: drop-shadow(0 0 4px #a371f7); }
      }

      @keyframes packet-main {
        0%   { transform: translate(170px, 315px); opacity: 0; }
        5%   { opacity: 1; }
        25%  { transform: translate(290px, 315px); opacity: 1; }
        50%  { transform: translate(500px, 315px); opacity: 1; }
        95%  { opacity: 1; }
        100% { transform: translate(730px, 315px); opacity: 0; }
      }

      @keyframes packet-context {
        0%   { transform: translate(500px, 180px); opacity: 0; }
        15%  { opacity: 1; }
        85%  { transform: translate(500px, 235px); opacity: 1; }
        100% { transform: translate(500px, 245px); opacity: 0; }
      }

      @keyframes packet-test {
        0%   { transform: translate(500px, 385px); opacity: 0; }
        15%  { opacity: 1; }
        85%  { transform: translate(500px, 440px); opacity: 1; }
        100% { transform: translate(500px, 450px); opacity: 0; }
      }

      @keyframes feedback-loop {
        0%   { stroke-dashoffset: 0; opacity: 0.35; }
        50%  { opacity: 0.85; }
        100% { stroke-dashoffset: -48; opacity: 0.35; }
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }

      .agent-core { animation: core-pulse 3s infinite ease-in-out; }
      .packet-main-1 { animation: packet-main 4.2s infinite linear; }
      .packet-main-2 { animation: packet-main 4.2s infinite linear; animation-delay: 1.4s; }
      .packet-context { animation: packet-context 2s infinite linear; }
      .packet-test { animation: packet-test 2.2s infinite linear; animation-delay: 0.5s; }
      .loop-line { animation: feedback-loop 2.6s infinite linear; }
      .ring { animation: spin 14s infinite linear; transform-origin: 500px 315px; }

      .text-code { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #8b949e; }
      .text-title { font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: bold; fill: #c9d1d9; }
      .text-center-title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; }
      .text-blue { fill: #58a6ff; font-weight: bold; }
      .text-purple { fill: #d2a8ff; font-weight: bold; }
      .text-green { fill: #3fb950; font-weight: bold; }
      .text-red { fill: #ff7b72; font-weight: bold; }
      .text-orange { fill: #e3b341; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" />

  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#21262d" stroke-width="0.5" />
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <text x="500" y="46" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#c9d1d9" text-anchor="middle">Agentic Smart Repair Architecture</text>

  <!-- Horizontal pipelines -->
  <path d="M 250 315 L 360 315" stroke="#30363d" stroke-width="6" stroke-linecap="round" />
  <path d="M 640 315 L 750 315" stroke="#30363d" stroke-width="6" stroke-linecap="round" />

  <!-- Vertical pipelines -->
  <path d="M 500 180 L 500 245" stroke="#30363d" stroke-width="5" stroke-linecap="round" />
  <path d="M 500 385 L 500 450" stroke="#30363d" stroke-width="5" stroke-linecap="round" />

  <!-- Loop line for retry -->
  <path d="M 640 495 C 710 495 710 385 600 385" fill="none" stroke="#f85149" stroke-width="2.5" stroke-dasharray="12 12" class="loop-line" />

  <!-- Block 1: Scanner & Issue Queue -->
  <rect x="70" y="265" width="180" height="100" rx="9" fill="#161b22" stroke="#f85149" stroke-width="2.5" filter="url(#glow-red)" />
  <text x="160" y="295" class="text-title text-red" text-anchor="middle">Scanner &amp; Queue</text>
  <text x="85" y="318" class="text-code" text-anchor="start">• Syntax errors</text>
  <text x="85" y="336" class="text-code" text-anchor="start">• Variable errors</text>
  <text x="85" y="354" class="text-code" text-anchor="start">• Damaged entries</text>

  <!-- Block 2: Context Pack (Top) -->
  <rect x="360" y="90" width="280" height="90" rx="9" fill="#0d1117" stroke="#a371f7" stroke-width="2.5" filter="url(#glow-purple)" />
  <text x="500" y="118" class="text-title text-purple" text-anchor="middle">Dynamic Context Pack</text>
  <text x="375" y="140" class="text-code" text-anchor="start">• Glossary terms (fuzzy match)</text>
  <text x="375" y="156" class="text-code" text-anchor="start">• Dynamic few-shot examples</text>
  <text x="375" y="172" class="text-code" text-anchor="start">• Original source text fallback</text>

  <!-- Block 3: Reflexion Agent (Center) -->
  <g>
    <circle cx="500" cy="315" r="110" fill="none" stroke="#21262d" stroke-width="2" class="ring" stroke-dasharray="18 10 5 10" />
    <rect x="360" y="245" width="280" height="140" rx="12" fill="#090c10" stroke="#a371f7" stroke-width="3" class="agent-core" filter="url(#glow-purple)" />
    <text x="500" y="280" class="text-center-title" text-anchor="middle">REFLEXION AGENT</text>
    <text x="500" y="303" class="text-code text-purple" font-weight="700" text-anchor="middle">Reflect ➔ Suggest ➔ Verify</text>

    <!-- Sub-boxes for Reflection / Suggestion / Verification -->
    <rect x="385" y="330" width="70" height="24" rx="4" fill="#1f2428" stroke="#30363d" />
    <text x="420" y="346" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Reflect</text>
    
    <rect x="465" y="330" width="70" height="24" rx="4" fill="#1f2428" stroke="#30363d" />
    <text x="500" y="346" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Suggest</text>
    
    <rect x="545" y="330" width="70" height="24" rx="4" fill="#1f2428" stroke="#30363d" />
    <text x="580" y="346" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Verify</text>
  </g>

  <!-- Block 4: Post-Validator (Bottom) -->
  <rect x="360" y="450" width="280" height="90" rx="9" fill="#0d1117" stroke="#d29922" stroke-width="2.5" filter="url(#glow-orange)" />
  <text x="500" y="478" class="text-title text-orange" text-anchor="middle">Post-Validator Gate</text>
  <text x="375" y="500" class="text-code" text-anchor="start">• Tag closures (§Y/§!)</text>
  <text x="375" y="516" class="text-code" text-anchor="start">• Variable parity ($var$)</text>
  <text x="375" y="532" class="text-code" text-anchor="start">• Character set filter</text>

  <!-- Block 5: Clean Output & Persist (Right) -->
  <rect x="750" y="265" width="180" height="100" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="2.5" filter="url(#glow-green)" />
  <text x="840" y="295" class="text-title text-green" text-anchor="middle">Output &amp; Persist</text>
  <text x="765" y="318" class="text-code" text-anchor="start">• SQLite database</text>
  <text x="765" y="336" class="text-code" text-anchor="start">• Deploy-ready YML</text>
  <text x="765" y="354" class="text-code" text-anchor="start">• Clean patch sets</text>

  <!-- Animated moving packets -->
  <g class="packet-main-1">
    <rect x="-10" y="-10" width="20" height="20" rx="5" fill="#f85149" stroke="#ff7b72" stroke-width="2" filter="url(#glow-red)" />
  </g>
  <g class="packet-main-2">
    <rect x="-10" y="-10" width="20" height="20" rx="5" fill="#58a6ff" stroke="#79c0ff" stroke-width="2" filter="url(#glow-blue)" />
  </g>

  <g class="packet-context">
    <circle cx="0" cy="0" r="5" fill="#d2a8ff" filter="url(#glow-purple)" />
  </g>
  <g class="packet-test">
    <rect x="-5" y="-8" width="10" height="16" rx="2" fill="#e3b341" />
  </g>

  <!-- Labels on pipeline lines -->
  <text x="305" y="298" class="text-code" text-anchor="middle">Input</text>
  <text x="695" y="298" class="text-code" text-anchor="middle">Output</text>
  <text x="680" y="440" class="text-code text-red" text-anchor="start">Sieve &amp; Retry</text>
  <text x="490" y="212" class="text-code text-purple" text-anchor="end">Evidence</text>
  <text x="510" y="418" class="text-code text-orange" text-anchor="start">Validation Gate</text>
</svg>
